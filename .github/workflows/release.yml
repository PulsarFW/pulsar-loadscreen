name: Create release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install zip
        run: sudo apt install zip

      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build UI
        run: npm run build
        working-directory: web

      - name: Bundle files
        run: |
          mkdir -p ./temp/pulsar-loadscreen
          cp ./{README.md,fxmanifest.lua,LICENSE} ./temp/pulsar-loadscreen
          cp -r ./web ./temp/pulsar-loadscreen
          rm -rf ./temp/pulsar-loadscreen/web/node_modules
          cd ./temp && zip -r ../pulsar-loadscreen.zip ./pulsar-loadscreen

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PULSAR-LOADSCREEN ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## PULSAR-LOADSCREEN ${{ github.ref_name }}

            Custom loading screen for Pulsar Framework.

            ### Installation
            1. Download `pulsar-loadscreen.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-loadscreen` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-loadscreen.zip
          prerelease: false
